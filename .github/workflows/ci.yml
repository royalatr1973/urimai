name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client generation needs an env file to exist; the example is enough
      # (generate does not connect to a database).
      - name: Stub .env for prisma generate
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build all packages
        run: pnpm build

      - name: Typecheck (including tests)
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
